name: CI

on:
  push:
    paths:
      - ".github/workflows/ci.yml"
      - "main.js"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "src/**"
      - "test/**"
      - "start.cmd"
      - "start.bat"
      - "start.sh"
      - "atualizar.cmd"
      - "atualizar.bat"
      - "atualizar.sh"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "main.js"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "src/**"
      - "test/**"
      - "start.cmd"
      - "start.bat"
      - "start.sh"
      - "atualizar.cmd"
      - "atualizar.bat"
      - "atualizar.sh"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run RCF check with fixtures
        run: npm run check:test
